      properties:
        name: {type: string, minLength: 1, maxLength: 160}
        daysOfWeek: {type: array, minItems: 1, maxItems: 7, uniqueItems: true, items: {type: integer, minimum: 0, maximum: 6}}
        localTime: {type: string, pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'}
        timezone: {type: string, enum: [Asia/Bangkok]}
        periodPreset: {$ref: '#/components/schemas/PeriodPreset'}
        reportKeys: {type: array, minItems: 1, maxItems: 10, uniqueItems: true, items: {$ref: '#/components/schemas/ReportKey'}}
        recipientIds: {type: array, minItems: 1, maxItems: 500, uniqueItems: true, items: {type: string, format: uuid}}
        version: {type: integer, minimum: 1}
    Schedule:
      allOf:
        - {$ref: '#/components/schemas/ScheduleInput'}
        - type: object
          required: [id, tenantId, status, version, readinessBlockers, nextOccurrences, createdAt, updatedAt]
          properties:
            id: {type: string, format: uuid}
            tenantId: {type: string, format: uuid}
            status: {$ref: '#/components/schemas/ScheduleStatus'}
            version: {type: integer, minimum: 1}
            readinessBlockers: {type: array, items: {type: string}}
            nextOccurrences: {type: array, maxItems: 3, items: {type: string, format: date-time}}
            createdAt: {type: string, format: date-time}
            updatedAt: {type: string, format: date-time}
            archivedAt: {type: string, format: date-time, nullable: true}
    SchedulePage:
      type: object
      required: [data, page]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/Schedule'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    FlexPreviewInput:
      type: object
      additionalProperties: false
      required: [periodPreset, reportKeys]
      properties:
        periodPreset: {$ref: '#/components/schemas/PeriodPreset'}
        reportKeys: {type: array, minItems: 1, maxItems: 10, uniqueItems: true, items: {$ref: '#/components/schemas/ReportKey'}}
    FlexPreviewMetric:
      type: object
      additionalProperties: false
      required: [label, value]
      properties:
        label: {type: string}
