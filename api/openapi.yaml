      properties:
        id: {type: string, format: uuid}
        tenantId: {type: string, format: uuid}
        tenantName: {type: string, description: Present on Admin report history responses.}
        reportKey: {$ref: '#/components/schemas/ReportKey'}
        status: {$ref: '#/components/schemas/ReportRunStatus'}
        periodPreset: {type: string}
        dateFrom: {type: string, format: date, nullable: true}
        dateTo: {type: string, format: date, nullable: true}
        rowCount: {type: integer, minimum: 0}
        isTruncated: {type: boolean}
        summary: {type: object, additionalProperties: true}
        reconciliation: {type: object, additionalProperties: true}
        safeErrorCode: {type: string, nullable: true}
        safeErrorMessage: {type: string, nullable: true}
        queuePosition: {type: integer, minimum: 1, nullable: true}
        queuedAt: {type: string, format: date-time}
        startedAt: {type: string, format: date-time, nullable: true}
        finishedAt: {type: string, format: date-time, nullable: true}
        expiresAt: {type: string, format: date-time}
    ReportRunPage:
      type: object
      required: [data, page]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/ReportRun'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    ReportRowPage:
      type: object
      required: [runId, columns, data, page]
      properties:
        runId: {type: string, format: uuid}
        columns: {type: array, items: {type: string}}
        data: {type: array, items: {type: object, additionalProperties: true}}
        page: {$ref: '#/components/schemas/PageInfo'}
    ReportPeriod:
      type: object
      additionalProperties: false
      required: [preset, dateFrom, dateTo]
      properties:
        preset: {type: string, enum: [YESTERDAY, TODAY_TO_NOW, MONTH_TO_DATE, AS_OF_RUN, CUSTOM]}
        dateFrom: {type: string, format: date}
        dateTo: {type: string, format: date}
    MetricUnit:
      type: string
      enum: [THB, COUNT, PERCENT, QUANTITY, RATIO]
    MetricComparison:
      type: object
      additionalProperties: false
      required: [availability]
      properties:
        availability: {type: string, enum: [AVAILABLE, UNAVAILABLE]}
        previousValue: {type: string, pattern: '^-?[0-9]+(?:\.[0-9]+)?$'}
        delta: {type: string, pattern: '^-?[0-9]+(?:\.[0-9]+)?$'}
        percent: {type: string, pattern: '^-?[0-9]+(?:\.[0-9]+)?$'}
        direction: {type: string, enum: [UP, DOWN, SAME]}
    DashboardMetric:
      type: object
      additionalProperties: false
      required: [key, label, value, unit, comparison]
      properties:
        key: {type: string, minLength: 1, maxLength: 80}
        label: {type: string, minLength: 1, maxLength: 160}
        value: {type: string, pattern: '^-?[0-9]+(?:\.[0-9]+)?$'}
        unit: {$ref: '#/components/schemas/MetricUnit'}
        comparison: {$ref: '#/components/schemas/MetricComparison'}
    VisualizationSeries:
      type: object
      additionalProperties: false
      required: [key, label, values]
      properties:
        key: {type: string, minLength: 1, maxLength: 80}
        label: {type: string, minLength: 1, maxLength: 160}
        values:
          type: array
          maxItems: 92
          items: {type: string, pattern: '^-?[0-9]+(?:\.[0-9]+)?$'}
        pointLabels:
          type: array
          maxItems: 92
          items: {type: string, maxLength: 80}
    DashboardVisualization:
      type: object
      additionalProperties: false
      required: [key, title, intent, unit, categories, series]
      properties:
        key: {type: string, minLength: 1, maxLength: 80}
        title: {type: string, minLength: 1, maxLength: 160}
        intent: {type: string, enum: [TREND, RANKING, COMPOSITION, EXCEPTION]}
        unit: {$ref: '#/components/schemas/MetricUnit'}
        categories:
          type: array
          maxItems: 92
          items: {type: string, maxLength: 160}
        series:
          type: array
          minItems: 1
          maxItems: 6
          items: {$ref: '#/components/schemas/VisualizationSeries'}
        note: {type: string, maxLength: 500}
    DashboardQuality:
      type: object
      additionalProperties: false
      required: [status, warnings]
      properties:
        status: {type: string, enum: [OK, WARNING]}
        warnings:
          type: array
          maxItems: 20
          items: {type: string, maxLength: 120}
    ReportDashboard:
      type: object
      additionalProperties: false
      required: [reportKey, version, period, comparisonPeriod, timezone, generatedAt, kpis, visualizations, quality]
      properties:
        reportKey: {$ref: '#/components/schemas/ReportKey'}
        version: {type: string, minLength: 1, maxLength: 32}
        period: {$ref: '#/components/schemas/ReportPeriod'}
        comparisonPeriod: {$ref: '#/components/schemas/ReportPeriod'}
        timezone: {type: string, enum: [Asia/Bangkok]}
        generatedAt: {type: string, format: date-time}
        kpis:
          type: array
          minItems: 2
          maxItems: 8
          items: {$ref: '#/components/schemas/DashboardMetric'}
        visualizations:
          type: array
          maxItems: 4
          items: {$ref: '#/components/schemas/DashboardVisualization'}
        quality: {$ref: '#/components/schemas/DashboardQuality'}
    DashboardSnapshot:
      type: object
      additionalProperties: false
      required: [runId, dashboard]
      properties:
        runId: {type: string, format: uuid}
        dashboard: {$ref: '#/components/schemas/ReportDashboard'}
    ExecutiveOverview:
      type: object
      additionalProperties: false
      required: [tenantId, timezone, items]
      properties:
        tenantId: {type: string, format: uuid}
        timezone: {type: string, enum: [Asia/Bangkok]}
        items:
          type: array
          maxItems: 10
          items: {$ref: '#/components/schemas/DashboardSnapshot'}
    DashboardRefreshRun:
      type: object
      additionalProperties: false
      required: [reportKey, runId, status]
      properties:
        reportKey: {$ref: '#/components/schemas/ReportKey'}
        runId: {type: string, format: uuid}
        status: {$ref: '#/components/schemas/ReportRunStatus'}
    DashboardRefresh:
      type: object
      additionalProperties: false
      required: [id, tenantId, status, total, completed, failed, runs, createdAt]
      properties:
        id: {type: string, format: uuid}
        tenantId: {type: string, format: uuid}
        status: {type: string, enum: [QUEUED, RUNNING, PARTIAL, SUCCEEDED, FAILED]}
        total: {type: integer, minimum: 1, maximum: 10}
        completed: {type: integer, minimum: 0, maximum: 10}
        failed: {type: integer, minimum: 0, maximum: 10}
        runs:
          type: array
          maxItems: 10
          items: {$ref: '#/components/schemas/DashboardRefreshRun'}
        createdAt: {type: string, format: date-time}
        finishedAt: {type: string, format: date-time, nullable: true}
    LineSessionInput:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken: {type: string, minLength: 32, maxLength: 8192, writeOnly: true}
        invitationReference: {type: string, minLength: 32, maxLength: 128, writeOnly: true}
        deliveryReference: {type: string, minLength: 32, maxLength: 512, writeOnly: true}
    ViewerMe:
      type: object
      required: [recipientId, displayName, expiresAt]
      properties:
        recipientId: {type: string, format: uuid}
        displayName: {type: string}
        csrfToken: {type: string, writeOnly: true}
        expiresAt: {type: string, format: date-time}
    ViewerTenant:
      type: object
      required: [id, name, timezone, reportKeys]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        timezone: {type: string}
        reportKeys: {type: array, uniqueItems: true, items: {$ref: '#/components/schemas/ReportKey'}}
    Delivery:
      type: object
      required: [id, tenantId, tenantName, recipientDisplayName, status, attempt, createdAt, expiresAt]
      properties:
        id: {type: string, format: uuid}
        tenantId: {type: string, format: uuid}
        tenantName: {type: string}
        recipientDisplayName: {type: string, description: Decrypted recipient label for authenticated Admin display only.}
        status: {type: string, enum: [PENDING, SENDING, ACCEPTED, RETRY_WAIT, UNCERTAIN, FAILED_PERMANENT]}
        attempt: {type: integer, minimum: 0}
        safeErrorCode: {type: string, nullable: true}
        acceptedAt: {type: string, format: date-time, nullable: true}
        createdAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
    LineQuotaStatus:
      type: object
      additionalProperties: false
      required: [state, providerLimit, providerConsumed, locallyAccepted, operationalReservePercent, syncedAt]
      properties:
        state: {type: string, enum: [READY, UNLIMITED, STALE, UNSYNCED]}
        providerLimit: {type: integer, minimum: 0, nullable: true, description: "Provider target limit; null means unlimited or not yet synced, distinguished by state."}
        providerConsumed: {type: integer, minimum: 0, nullable: true, description: Approximate provider-wide consumption including Nexflow and OA Manager.}
        locallyAccepted: {type: integer, minimum: 0, description: Push messages accepted from Nextstep Dashboard in the current month.}
        operationalReservePercent: {type: integer, minimum: 0, maximum: 50}
        syncedAt: {type: string, format: date-time, nullable: true}
    DeliveryPage:
      type: object
      required: [data, page]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/Delivery'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    AuditEvent:
      type: object
      required: [id, actorType, action, resourceType, result, createdAt]
      properties:
        id: {type: string, format: uuid}
        tenantId: {type: string, format: uuid, nullable: true}
        tenantName: {type: string, nullable: true}
        actorType: {type: string, enum: [ADMIN, VIEWER, WORKER, SYSTEM]}
        action: {type: string}
        resourceType: {type: string}
        resourceId: {type: string, nullable: true}
        result: {type: string, enum: [SUCCESS, DENIED, FAILED]}
        safeErrorCode: {type: string, nullable: true}
        createdAt: {type: string, format: date-time}
    AuditPage:
      type: object
      required: [data, page]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/AuditEvent'}}
        page: {$ref: '#/components/schemas/PageInfo'}
