    AdminReportDefinition:
      type: object
      required: [reportKey, version, label, category, categoryLabel, status]
      properties:
        reportKey: {$ref: '#/components/schemas/ReportKey'}
        version: {type: string}
        label: {type: string}
        category: {type: string}
        categoryLabel: {type: string}
        status: {type: string, enum: [ACTIVE, DEPRECATED]}
    AdminReportCatalog:
      type: object
