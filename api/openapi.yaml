          properties:
            maxScheduleReports: {type: integer, minimum: 1}
            maxFlexPayloadBytes: {type: integer, minimum: 1}
    PeriodPreset: {type: string, enum: [YESTERDAY, TODAY_TO_NOW, MONTH_TO_DATE, AS_OF_RUN]}
    ScheduleStatus: {type: string, enum: [DRAFT, ACTIVE, PAUSED, EXPIRED, ARCHIVED]}
    ScheduleInput:
      type: object
