    CreateReportRunInput:
      type: object
      additionalProperties: false
      required: [periodPreset]
      properties:
        periodPreset: {type: string, enum: [YESTERDAY, TODAY_TO_NOW, MONTH_TO_DATE, AS_OF_RUN, CUSTOM]}
        dateFrom: {type: string, format: date}
        dateTo: {type: string, format: date}
    ReportRun:
      type: object
