      properties:
        id: {type: string, format: uuid}
        status: {type: string, enum: [PENDING, ACTIVE, REVOKED]}
        displayName: {type: string}
        reportKeys: {type: array, uniqueItems: true, items: {$ref: '#/components/schemas/ReportKey'}}
        permissionsVersion: {type: integer, minimum: 1}
        verifiedAt: {type: string, format: date-time, nullable: true}
        createdAt: {type: string, format: date-time}
        invitationUrl: {type: string, format: uri, nullable: true, description: Returned only when a pending invitation is created.}
    RecipientPage:
      type: object
      required: [data, page]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/Recipient'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    PermissionUpdate:
      type: object
