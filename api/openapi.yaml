        tenantName: {type: string}
        period:
          type: object
          additionalProperties: false
          required: [preset, dateFrom, dateTo]
          properties:
            preset: {$ref: '#/components/schemas/PeriodPreset'}
            dateFrom: {type: string, format: date}
            dateTo: {type: string, format: date}
        periodLabel: {type: string}
        generatedAt: {type: string, format: date-time}
        actionUrl: {type: string, format: uri}
        reports: {type: array, minItems: 1, maxItems: 10, items: {$ref: '#/components/schemas/FlexPreviewReport'}}
        payloadBytes: {type: integer, minimum: 1, maximum: 30719}
        message: {type: object, additionalProperties: true, description: Exact LINE Messaging API Flex message object produced by the backend renderer.}
    NotificationExecution:
      type: object
      additionalProperties: false
