        localTime: {type: string, pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'}
        timezone: {type: string, enum: [Asia/Bangkok]}
        periodPreset: {$ref: '#/components/schemas/PeriodPreset'}
        reportKeys: {type: array, minItems: 1, maxItems: 10, uniqueItems: true, items: {$ref: '#/components/schemas/ReportKey'}}
        recipientIds: {type: array, minItems: 1, maxItems: 500, uniqueItems: true, items: {type: string, format: uuid}}
    SchedulePatch:
      type: object
